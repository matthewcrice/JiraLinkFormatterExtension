<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      margin: 0;
      background: #fff;
      color: #172b4d;
    }
    h2 { margin: 0 0 8px; font-size: 15px; color: #0052cc; }
    p  { margin: 0 0 12px; font-size: 12px; color: #5e6c84; line-height: 1.5; }
    button {
      width: 100%;
      padding: 8px 12px;
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #0065ff; }
    #status { margin-top: 10px; font-size: 12px; color: #5e6c84; min-height: 16px; }
    .shortcut { background: #f4f5f7; border-radius: 3px; padding: 2px 5px; font-family: monospace; font-size: 11px; }
  </style>
</head>
<body>
  <h2>Jira Link Formatter</h2>
  <p>On a Jira issue page, pressing <span class="shortcut">Ctrl+C</span> with nothing selected copies a formatted link:</p>
  <p><em>Issue Title: PROJ-123</em> (PROJ-123 is a hyperlink)</p>
  <p>Or use the keyboard shortcut <span class="shortcut">Alt+C</span> from anywhere.</p>
  <button id="copyBtn">Copy Current Issue Link</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
